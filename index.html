<!DOCTYPE html>
<html lang="ja">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Photo & Visual Design</title>

        <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

        <style>
            body{
                margin:0;
                font-family:'Poppins', sans-serif;
                background:black;
                color:white;
            }

            /* TOP */
            .hero{
                height:100vh;
                background:
                    linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)),
                    url("img1.JPG") center/cover no-repeat;
                display:flex;
                justify-content:center;
                align-items:center;
            }

            .hero h1{
                font-size:40px;
                background:rgba(0,0,0,0.4);
                padding:10px 20px;
                letter-spacing:2px;
            }

            /* セクション */
            section{
                padding:100px 20px;
                max-width:1100px;
                margin:auto;
            }

            /* ストーリー */
            .story{
                margin-bottom:80px;
                opacity:0;
                transform:translateY(50px);
                transition:1s;
                text-align:center;
            }

            .story.active{
                opacity:1;
                transform:translateY(0);
            }

            .story img{
                width:100%;
                max-width:600px;   
                height:400px;      
                object-fit:cover;  
                border-radius:10px;
                display:block;
                margin:0 auto;
            }

            .story h2{
                margin-top:20px;
            }

            .story p{
                color:#ccc;
            }

            /* ギャラリー */
            .gallery{
                display:grid;
                grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
                gap:15px;
            }

            .gallery img{
                width:100%;
                height:200px;
                object-fit:cover;
                cursor:pointer;
                transition:0.3s;
                border-radius:8px;
            }

            .gallery img:hover{
                transform:scale(1.05);
                opacity:0.8;
            }

            /* モーダル */
            .modal{
                display:none;
                position:fixed;
                top:0;
                left:0;
                width:100%;
                height:100%;
                background:rgba(0,0,0,0.9);
                justify-content:center;
                align-items:center;
            }

            .modal img{
                max-width:90%;
                max-height:90%;
            }
        </style>
    </head>

    <body>

        <!-- TOP -->
        <div class="hero">
            <h1>Moments in Everyday Life</h1>
        </div>

        <!-- STORY -->
        <section>
            <div class="story">
                <img src="imgs/img1.JPG">
                <h2>ふとした視線</h2>
                <p>何気ない瞬間に見せた、静かな存在感。</p>
            </div>

            <div class="story">
                <img src="imgs/img8.JPG">
                <h2>光の中のひととき</h2>
                <p>差し込む光が、いつもの時間を少し特別にする。</p>
            </div>

            <div class="story">
                <img src="imgs/img5.JPG">
                <h2>小さな世界</h2>
                <p>並んだものたちが、それぞれの物語を持っている。</p>
            </div>
        </section>

        <!-- GALLERY -->
        <section>
            <h2>Gallery</h2>
            <div class="gallery">
                <img src="imgs/img1.JPG">
                <img src="imgs/img2.JPG">
                <img src="imgs/img3.JPG">
                <img src="imgs/img4.JPG">
                <img src="imgs/img5.JPG">
                <img src="imgs/img6.JPG">
                <img src="imgs/img7.JPG">
                <img src="imgs/img8.JPG">
                <img src="imgs/img9.JPG">
                <img src="imgs/img10.JPG">
                <img src="imgs/img11.JPG">
                <img src="imgs/img12.JPG">
            </div>
        </section>

        <!-- モーダル -->
        <div class="modal" id="modal">
            <img id="modalImg">
        </div>

        <script>
            // フェードイン
            const stories = document.querySelectorAll(".story");

            window.addEventListener("scroll", () => {
                stories.forEach(story => {
                    const pos = story.getBoundingClientRect().top;
                    if(pos < window.innerHeight - 100){
                        story.classList.add("active");
                    }
                });
            });

            // モーダル
            const images = document.querySelectorAll(".gallery img");
            const modal = document.getElementById("modal");
            const modalImg = document.getElementById("modalImg");

            images.forEach(img => {
                img.addEventListener("click", () => {
                    modal.style.display = "flex";
                    modalImg.src = img.src;
                });
            });

            modal.addEventListener("click", () => {
                modal.style.display = "none";
            });
        </script>

    </body>
</html>
